{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg p-4">

                <h2 class="text-center mb-4">
                    Login
                </h2>

                <form method="POST" action="/login">

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            placeholder="Enter your password"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

                <hr>

                <p class="text-center">

                    Don't have an account?

                    <a href="/register">
                        Register Here
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
